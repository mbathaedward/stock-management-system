{% extends 'home.html' %}
{% load static %}

{% block content %}

<h2>List of Items</h2>

<div class="display_table">
<table class="table">
    <thead>
        <tr>
            <th>Count</th>
            <th>Category</th>
            <th>Item Name</th>
            <th>Quantity In Store</th>
        </tr>
    </thead>
    {% for instance in queryset %}
    <tr>
        <td>{{forloop.counter}}</td>
        <td>{{instance.category}}</td>
        <td>{{instance.item_name}}</td>
        <td>{{instance.quantity}}</td>
    </tr>
    {% endfor %}
</table>
</div>
{% endblock content%}
